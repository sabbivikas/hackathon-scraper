name: Hackathon Scraper

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9am UTC
    - cron: '0 9 * * 4'   # Thursday 9am UTC
  workflow_dispatch:        # allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: hackathon-scraper

      - name: Run scraper
        env:
          EXASEARCH_API_KEY: ${{ secrets.EXASEARCH_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node index.js
        working-directory: hackathon-scraper

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hackathon-scraper/hackathons.csv
          git diff --cached --quiet || git commit -m "chore: update hackathons.csv [$(date -u '+%Y-%m-%d')]"
          git push
