name: Hackathon Scraper

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9am UTC
    - cron: '0 9 * * 4'   # Thursday 9am UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run scraper
        env:
          EXASEARCH_API_KEY: ${{ secrets.EXASEARCH_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node index.js

      - name: Remove credentials before commit
        run: rm -f credentials.json

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hackathons.csv
          git diff --cached --quiet || git commit -m "chore: update hackathons.csv [$(date -u '+%Y-%m-%d')]"
          git push
